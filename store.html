<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Respect Aura Store</title>

<style>
body{
    margin:0;
    font-family:Tahoma, Arial;
    background:#0e0e0e;
    color:white;
}

/* ===== الشريط العلوي ===== */
.top-bar{
    background:#7b2d3a;
    padding:20px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    position:relative;
}

/* ===== زر الرئيسية (صار يسار) ===== */
.home-btn{
    position:absolute;
    left:20px;
    top:20px;
    background:#111;
    color:white;
    padding:8px 15px;
    border-radius:10px;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.home-btn:hover{
    background:#000;
    color:#7b2d3a;
}

/* ===== صورة السيرفر (يمين) ===== */
.server-logo{
    position:absolute;
    right:20px;
    top:10px;
}

.server-logo img{
    height:50px;
}

/* ===== الحاوية الرئيسية ===== */
.container{
    width:90%;
    margin:auto;
    padding:40px 0;
}

/* ===== شبكة المنتجات ===== */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:25px;
}

/* ===== شكل الكرت ===== */
.card{
    background:#1a1a1a;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
    text-align:center;
    padding-bottom:15px;
}

.card:hover{
    transform:scale(1.05);
    background:#222;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    margin:15px 0 5px 0;
    font-size:20px;
}

.price{
    color:#7b2d3a;
    font-weight:bold;
    font-size:18px;
}

footer{
    background:#111;
    text-align:center;
    padding:20px;
    margin-top:40px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="top-bar">

    <!-- زر الرئيسية (يسار) -->
    <a class="home-btn" href="index.html">الرئيسية ⬅</a>

    Respect Aura | Store

    <!-- صورة السيرفر (يمين) -->
    <div class="server-logo">
        <img src="images/logo.png">
        <!-- غير المسار إلى صورة سيرفرك -->
    </div>

</div>

<div class="container">

    <!-- ######################################################## -->
    <!-- انسخ الكرت تحت وعدل الصورة والاسم والسعر فقط -->
    <!-- ######################################################## -->

    <div class="products">

        <!-- منتج 1 -->
        <div class="card">
            <img src="images/test.png">
            <h3>Test Car</h3>
            <div class="price">5 ريال</div>
        </div>

        <!-- مثال إضافة منتج -->
        <!--
        <div class="card">
            <img src="images/car2.png">
            <h3>اسم السيارة</h3>
            <div class="price">10 ريال</div>
        </div>
        -->

    </div>

</div>

<footer>
    © Respect Aura | Season 1
</footer>

</body>
</html>
